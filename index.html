<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#EDD5C8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wellness">
<title>Daily Wellness</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blush:#F5E8E0;--blush2:#EDD5C8;--rose:#C9897A;--dusty:#B07A89;
  --sage:#8FA88A;--sage-lt:#C8D9C4;--cream:#FAF6F2;--ink:#3A2E2C;--muted:#9A867E;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--ink);height:100dvh;display:flex;flex-direction:column}

/* ── BOTTOM NAV ── */
.bottom-nav{display:flex;background:#fff;border-top:1px solid var(--blush2);padding-bottom:var(--safe-bot);flex-shrink:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--muted);-webkit-tap-highlight-color:transparent;transition:color .2s}
.nav-btn.active{color:var(--dusty)}
.nav-btn .nav-icon{font-size:20px;line-height:1}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}

/* ── SHARED HEADER ── */
.app-header{background:linear-gradient(160deg,var(--blush) 0%,var(--blush2) 100%);padding:16px 20px 14px;padding-top:calc(16px + var(--safe-top));position:relative;overflow:hidden;flex-shrink:0}
.app-header svg.bg-floral{position:absolute;right:-14px;top:-14px;opacity:.45;pointer-events:none}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.header-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:24px;line-height:1.1;color:var(--ink)}
.header-title em{font-style:italic;color:var(--dusty)}
.icon-btn{background:rgba(255,255,255,.55);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.progress-wrap{margin-top:10px;display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,.5);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--dusty));border-radius:99px;transition:width .5s ease;width:0%}
.progress-label{font-size:11px;color:var(--dusty);white-space:nowrap;min-width:40px;text-align:right}

/* ── SCROLL BODY ── */
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px 20px}

/* ── CALENDAR STRIP ── */
.cal-strip{background:#fff;border-bottom:1px solid var(--blush);padding:10px 0;flex-shrink:0}
.cal-month-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:8px}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--dusty)}
.cal-nav{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 6px;-webkit-tap-highlight-color:transparent}
.cal-days{display:flex;overflow-x:auto;gap:6px;padding:0 16px;scrollbar-width:none}
.cal-days::-webkit-scrollbar{display:none}
.cal-day{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;width:40px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cal-day-name{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.cal-day-num{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;color:var(--ink);transition:background .2s,color .2s}
.cal-day.selected .cal-day-num{background:var(--dusty);color:#fff}
.cal-day.today .cal-day-num{border:1.5px solid var(--rose)}
.cal-day-dot{width:5px;height:5px;border-radius:50%;background:transparent}
.cal-day.has-data .cal-day-dot{background:var(--sage)}
.cal-day.selected.has-data .cal-day-dot{background:rgba(255,255,255,.7)}

/* ── SECTION LABEL ── */
.section-label{font-size:9px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:16px 0 7px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--blush)}
.section-label:first-child{margin-top:0}

/* ── CHECKLIST ITEMS ── */
.items{display:flex;flex-direction:column;gap:5px}
.item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:14px;cursor:pointer;border:1.5px solid transparent;background:var(--cream);transition:background .2s,border-color .2s,transform .1s;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.item:active{transform:scale(.97)}
.item.done{background:#fff;border-color:var(--sage-lt)}
.petal-box{width:24px;height:24px;flex-shrink:0}
.petal-box svg{width:100%;height:100%;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.item.done .petal-box svg{transform:scale(1.1) rotate(15deg)}
.petal-outer{fill:none;stroke:var(--blush2);stroke-width:1.5;transition:stroke .3s}
.petal-inner{fill:none;transition:fill .3s}
.tick{stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .25s .1s}
.item.done .petal-outer{stroke:var(--sage)}
.item.done .petal-inner{fill:var(--sage)}
.item.done .tick{opacity:1}
.item-emoji{font-size:15px;line-height:1}
.item-text{flex:1;font-size:13px;font-weight:300;color:var(--ink);transition:color .3s}
.item.done .item-text{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--sage-lt)}
.item-note{font-size:10px;color:var(--muted);display:block;margin-top:1px}

/* ── MOOD PICKER ── */
.mood-section{margin-top:20px;padding:16px;background:#fff;border-radius:16px;border:1.5px solid var(--blush2)}
.mood-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.mood-row{display:flex;justify-content:space-around}
.mood-opt{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mood-face{font-size:28px;line-height:1;transition:transform .2s;filter:grayscale(40%) opacity(.6)}
.mood-opt.selected .mood-face{filter:none;transform:scale(1.2)}
.mood-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;transition:color .2s}
.mood-opt.selected .mood-label{color:var(--dusty)}

/* done banner */
.done-banner{display:none;flex-direction:column;align-items:center;gap:5px;margin-top:16px;padding:16px;border-radius:16px;background:linear-gradient(135deg,var(--blush),var(--sage-lt));text-align:center}
.done-banner.show{display:flex}
.done-banner .bloom{font-size:26px}
.done-banner p{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--dusty)}
.done-banner small{font-size:11px;color:var(--muted)}
.reset-btn{display:block;width:100%;margin-top:14px;padding:10px;border:1.5px solid var(--blush2);border-radius:12px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.reset-btn:active{background:var(--blush)}

/* ══ WEEKLY SCREEN ══ */
.week-header{background:linear-gradient(160deg,var(--blush) 0%,var(--blush2) 100%);padding:16px 20px 14px;padding-top:calc(16px + var(--safe-top));flex-shrink:0;position:relative;overflow:hidden}
.week-header svg.bg-floral{position:absolute;right:-14px;top:-14px;opacity:.45;pointer-events:none}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.week-nav-btn{background:rgba(255,255,255,.55);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink)}
.week-label{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--dusty)}
.week-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:24px;color:var(--ink)}
.week-title em{font-style:italic;color:var(--dusty)}

.week-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px 20px}

/* day cards */
.week-days{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.week-day-card{background:#fff;border-radius:14px;border:1.5px solid var(--blush2);overflow:hidden}
.week-day-top{display:flex;align-items:center;gap:10px;padding:12px 14px}
.week-day-name{font-size:12px;font-weight:400;color:var(--ink);flex:1}
.week-day-date{font-size:10px;color:var(--muted)}
.week-day-mood{font-size:20px}
.week-progress-bar{height:4px;background:var(--blush);margin:0 14px 12px}
.week-progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--dusty));border-radius:99px;transition:width .5s}
.week-day-stats{padding:0 14px 12px;font-size:11px;color:var(--muted)}

/* mood summary card */
.mood-summary-card{background:#fff;border-radius:16px;border:1.5px solid var(--blush2);padding:16px;margin-bottom:16px}
.mood-summary-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.mood-summary-main{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.mood-summary-face{font-size:40px}
.mood-summary-text{flex:1}
.mood-summary-verdict{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--dusty)}
.mood-summary-sub{font-size:11px;color:var(--muted);margin-top:2px}
.mood-breakdown{display:flex;gap:6px;flex-wrap:wrap}
.mood-chip{display:flex;align-items:center;gap:4px;background:var(--cream);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted)}
.mood-chip span{font-size:14px}

/* goals summary card */
.goals-card{background:#fff;border-radius:16px;border:1.5px solid var(--blush2);padding:16px;margin-bottom:16px}
.goals-card-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.goals-big{font-family:'Cormorant Garamond',serif;font-size:36px;color:var(--ink);line-height:1}
.goals-big span{font-size:16px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:300}
.goals-sub{font-size:11px;color:var(--muted);margin-top:4px}
.week-bar-chart{margin-top:12px;display:flex;align-items:flex-end;gap:6px;height:60px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--rose),var(--dusty));min-height:2px;transition:height .5s}
.bar-day{font-size:9px;color:var(--muted)}

/* ══ CUSTOMISE SCREEN ══ */
.cust-header{background:linear-gradient(160deg,var(--blush) 0%,var(--blush2) 100%);padding:16px 20px 14px;padding-top:calc(16px + var(--safe-top));flex-shrink:0;display:flex;align-items:center;gap:12px}
.cust-header h2{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:22px;color:var(--ink);flex:1}
.cust-header h2 em{font-style:italic;color:var(--dusty)}
.back-btn{background:rgba(255,255,255,.55);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.cust-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px calc(80px + var(--safe-bot))}
.cust-section{margin-bottom:18px}
.cust-section-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.cust-section-name{font-size:9px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);flex:1}
.del-section-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 6px;border-radius:8px}
.edit-rows{display:flex;flex-direction:column;gap:5px}
.edit-row{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--blush2);border-radius:12px;padding:8px 10px;transition:border-color .2s}
.edit-row:focus-within{border-color:var(--rose)}
.drag-handle{color:var(--muted);font-size:14px;cursor:grab;flex-shrink:0;touch-action:none;padding:0 2px}
.emoji-btn{background:none;border:none;font-size:17px;cursor:pointer;flex-shrink:0;padding:0 2px;border-radius:6px}
.edit-inputs{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.edit-title{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:transparent;width:100%}
.edit-note{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--muted);background:transparent;width:100%}
.edit-title::placeholder,.edit-note::placeholder{color:#ccc}
.del-row-btn{background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;flex-shrink:0;line-height:1;padding:0 2px;transition:color .2s}
.del-row-btn:active{color:var(--rose)}
.add-item-btn{display:flex;align-items:center;gap:6px;width:100%;margin-top:5px;padding:9px 12px;border:1.5px dashed var(--blush2);border-radius:12px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
.add-section-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:1.5px dashed var(--blush2);border-radius:14px;background:transparent;color:var(--dusty);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:4px}
.save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 18px;padding-bottom:calc(12px + var(--safe-bot));background:rgba(250,246,242,.95);backdrop-filter:blur(8px);border-top:1px solid var(--blush2);display:flex;gap:10px;z-index:20}
.save-btn{flex:1;padding:12px;background:linear-gradient(135deg,var(--rose),var(--dusty));color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.discard-btn{padding:12px 16px;background:transparent;color:var(--muted);border:1.5px solid var(--blush2);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}

/* emoji picker */
.emoji-picker-overlay{display:none;position:fixed;inset:0;background:rgba(58,46,44,.3);z-index:100;align-items:flex-end}
.emoji-picker-overlay.show{display:flex}
.emoji-picker{background:#fff;border-radius:24px 24px 0 0;padding:16px 16px calc(16px + var(--safe-bot));width:100%;max-height:60vh}
.emoji-picker h3{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;overflow-y:auto;max-height:calc(60vh - 60px)}
.emoji-opt{font-size:22px;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer}
.emoji-opt:active{background:var(--blush)}

/* dialog */
.dialog-overlay{display:none;position:fixed;inset:0;background:rgba(58,46,44,.3);z-index:200;align-items:center;justify-content:center;padding:24px}
.dialog-overlay.show{display:flex}
.dialog{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:320px}
.dialog h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dusty);margin-bottom:12px}
.dialog input{width:100%;border:1.5px solid var(--blush2);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none}
.dialog input:focus{border-color:var(--rose)}
.dialog-btns{display:flex;gap:8px;margin-top:14px}
.dialog-ok{flex:1;padding:10px;background:linear-gradient(135deg,var(--rose),var(--dusty));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.dialog-cancel{padding:10px 14px;background:transparent;color:var(--muted);border:1.5px solid var(--blush2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}

/* install banner */
#install-banner{display:none;align-items:center;gap:10px;padding:10px 16px;padding-top:calc(10px + var(--safe-top));background:var(--dusty);color:#fff;font-size:13px;flex-shrink:0}
#install-banner.show{display:flex}
#install-btn{background:#fff;color:var(--dusty);border:none;border-radius:20px;padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer}
#dismiss-btn{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:0 4px}
</style>
</head>
<body>

<div id="install-banner">
  <span>🌸 Add to your home screen</span>
  <button id="install-btn">Install</button>
  <button id="dismiss-btn">✕</button>
</div>

<!-- ════ TODAY SCREEN ════ -->
<div class="screen active" id="screen-today">
  <div class="app-header">
    <svg class="bg-floral" width="100" height="100" viewBox="0 0 140 140" fill="none">
      <ellipse cx="90" cy="50" rx="18" ry="11" fill="#C9897A" opacity=".35" transform="rotate(-30 90 50)"/>
      <ellipse cx="90" cy="50" rx="18" ry="11" fill="#C9897A" opacity=".35" transform="rotate(30 90 50)"/>
      <ellipse cx="90" cy="50" rx="18" ry="11" fill="#C9897A" opacity=".35" transform="rotate(90 90 50)"/>
      <ellipse cx="90" cy="50" rx="18" ry="11" fill="#C9897A" opacity=".35" transform="rotate(150 90 50)"/>
      <circle cx="90" cy="50" r="7" fill="#B07A89" opacity=".5"/>
    </svg>
    <div class="header-row">
      <div class="header-title" id="today-title">Today's <em>Wellness</em></div>
      <div style="display:flex;gap:6px">
        <button class="icon-btn" onclick="goCustomise()" title="Customise">✏️</button>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
      <div class="progress-label" id="prog-label">0 / 0</div>
    </div>
  </div>

  <!-- calendar strip -->
  <div class="cal-strip">
    <div class="cal-month-row">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-days" id="cal-days"></div>
  </div>

  <div class="scroll-body" id="checklist-body"></div>
</div>

<!-- ════ WEEKLY SCREEN ════ -->
<div class="screen" id="screen-weekly">
  <div class="week-header">
    <svg class="bg-floral" width="100" height="100" viewBox="0 0 140 140" fill="none">
      <ellipse cx="90" cy="50" rx="18" ry="11" fill="#C9897A" opacity=".35" transform="rotate(-30 90 50)"/>
      <ellipse cx="90" cy="50" rx="18" ry="11" fill="#C9897A" opacity=".35" transform="rotate(30 90 50)"/>
      <ellipse cx="90" cy="50" rx="18" ry="11" fill="#C9897A" opacity=".35" transform="rotate(90 90 50)"/>
      <ellipse cx="90" cy="50" rx="18" ry="11" fill="#C9897A" opacity=".35" transform="rotate(150 90 50)"/>
      <circle cx="90" cy="50" r="7" fill="#B07A89" opacity=".5"/>
    </svg>
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">‹</button>
      <div class="week-label" id="week-range-label"></div>
      <button class="week-nav-btn" onclick="changeWeek(1)">›</button>
    </div>
    <div class="week-title">Weekly <em>Overview</em></div>
  </div>
  <div class="week-body" id="week-body"></div>
</div>

<!-- ════ CUSTOMISE SCREEN ════ -->
<div class="screen" id="screen-cust">
  <div class="cust-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <h2><em>Customise</em> your list</h2>
  </div>
  <div class="cust-body" id="cust-body"></div>
  <div class="save-bar">
    <button class="discard-btn" onclick="discardChanges()">Discard</button>
    <button class="save-btn" onclick="saveChanges()">Save changes</button>
  </div>
</div>

<!-- emoji picker -->
<div class="emoji-picker-overlay" id="emoji-overlay" onclick="closeEmojiPicker(event)">
  <div class="emoji-picker">
    <h3>Choose an emoji</h3>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>
</div>

<!-- section dialog -->
<div class="dialog-overlay" id="section-dialog">
  <div class="dialog">
    <h3>New section</h3>
    <input type="text" id="section-name-input" placeholder="e.g. Afternoon" maxlength="30">
    <div class="dialog-btns">
      <button class="dialog-cancel" onclick="closeSectionDialog()">Cancel</button>
      <button class="dialog-ok" onclick="confirmAddSection()">Add</button>
    </div>
  </div>
</div>

<!-- bottom nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
    <span class="nav-icon">🌸</span>Today
  </button>
  <button class="nav-btn" id="nav-weekly" onclick="switchTab('weekly')">
    <span class="nav-icon">📊</span>Weekly
  </button>
</div>

<script>
// ══════════════════════════════════════════
// CONSTANTS & DEFAULTS
// ══════════════════════════════════════════
const MOODS = [
  { id:'happy',    face:'😊', label:'Happy' },
  { id:'loved',    face:'🥰', label:'Loved' },
  { id:'calm',     face:'😌', label:'Calm' },
  { id:'tired',    face:'😴', label:'Tired' },
  { id:'sad',      face:'😢', label:'Sad' },
  { id:'anxious',  face:'😰', label:'Anxious' },
  { id:'angry',    face:'😤', label:'Angry' },
];
const MOOD_MAP = Object.fromEntries(MOODS.map(m=>[m.id,m]));

const MOOD_VERDICTS = {
  happy:   { verdict:'Overall a happy week 🌸', sub:'You radiated good energy this week.' },
  loved:   { verdict:'A week full of love 🥰',  sub:'You felt connected and warm.' },
  calm:    { verdict:'A peaceful week 🍃',       sub:'You carried a quiet inner stillness.' },
  tired:   { verdict:'A tiring week 😴',         sub:'Rest is part of the ritual too.' },
  sad:     { verdict:'A heavy week 💙',          sub:'Be gentle with yourself. Better days bloom.' },
  anxious: { verdict:'An anxious week 😰',       sub:'You showed up even when it was hard.' },
  angry:   { verdict:'A tough week 😤',          sub:'Your feelings are valid. Let it out.' },
};

const DEFAULT_SECTIONS = [
  { id:'morning', name:'Morning', items:[
    { id:'wake',        emoji:'🌤', title:'Wake up early',          note:'Before 7 am' },
    { id:'vitamins',    emoji:'💊', title:'Vitamins & supplements', note:'Vitamin D, Omega-3, Magnesium' },
    { id:'skincare-am', emoji:'🫧', title:'Skincare routine',       note:'Cleanse · SPF · moisturize' },
    { id:'water-am',    emoji:'💧', title:'Morning glass of water', note:'Before coffee' },
  ]},
  { id:'body', name:'Body', items:[
    { id:'workout', emoji:'🏃‍♀️', title:'Workout',               note:'30 min minimum' },
    { id:'water',   emoji:'🥤', title:'Hit water goal',           note:'2 L / 8 glasses' },
    { id:'food',    emoji:'🥗', title:'Eat something nourishing', note:'Protein + greens' },
    { id:'steps',   emoji:'🚶‍♀️', title:'Steps outside',         note:'Fresh air & sunlight' },
  ]},
  { id:'mind', name:'Mind', items:[
    { id:'read',     emoji:'📖', title:'Read or journal',      note:'10 min minimum' },
    { id:'breathe',  emoji:'🧘‍♀️', title:'Breathe & slow down', note:'Meditate or stretch' },
    { id:'noscreen', emoji:'📵', title:'Phone-free hour',      note:'Morning or evening' },
  ]},
  { id:'evening', name:'Evening', items:[
    { id:'skincare-pm', emoji:'✨', title:'Evening skincare',   note:'Cleanse · serum · moisturize' },
    { id:'winddown',    emoji:'🌙', title:'Wind-down routine',  note:'No screens after 9 pm' },
    { id:'sleep',       emoji:'😴', title:'Sleep by 10:30 pm', note:'7–8 hours tonight' },
  ]},
];

const EMOJIS = ['🌤','💊','🫧','💧','🏃‍♀️','🥤','🥗','🚶‍♀️','📖','🧘‍♀️','📵','✨','🌙','😴',
  '🌸','🌿','🍋','🍵','☕','🫖','🛁','💆‍♀️','🪷','🌺','💐','🌱','🥦','🍎','🫐','🥑',
  '💪','🎯','📝','🎨','🎵','📚','🧴','💄','👟','🏊‍♀️','🚴‍♀️','🧗‍♀️','🌅','🌄','⭐','✅',
  '🫀','🦷','💅','🛌','🧹','🪴','🐾','🐶','🐱','☀️','🌙','❄️','🌊','🔮','🕯️','🪞'];

// ══════════════════════════════════════════
// STORAGE HELPERS
// ══════════════════════════════════════════
const SECTIONS_KEY = 'wellness-sections';
function dateKey(d) { return 'wellness-day-' + fmtDate(d); }
function fmtDate(d) { return d.toISOString().slice(0,10); }

function loadSections() {
  try { const s = JSON.parse(localStorage.getItem(SECTIONS_KEY)); if(s) return s; } catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
}
function saveSections(s) { try { localStorage.setItem(SECTIONS_KEY, JSON.stringify(s)); } catch(e){} }

function loadDayData(d) {
  try { return JSON.parse(localStorage.getItem(dateKey(d)) || '{}'); } catch(e){ return {}; }
}
function saveDayData(d, data) { try { localStorage.setItem(dateKey(d), JSON.stringify(data)); } catch(e){} }

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let sections = loadSections();
let selectedDate = new Date();
selectedDate.setHours(0,0,0,0);
let calViewDate = new Date(selectedDate);
let dayData = loadDayData(selectedDate); // { done:{id:bool}, mood:'happy' }
let editSections = null;
let weekOffset = 0;

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

// ══════════════════════════════════════════
// PETAL SVG
// ══════════════════════════════════════════
function petalSVG() {
  return `<svg viewBox="0 0 26 26"><ellipse class="petal-outer" cx="13" cy="13" rx="9" ry="5.5" transform="rotate(0 13 13)"/><ellipse class="petal-inner" cx="13" cy="13" rx="9" ry="5.5" transform="rotate(0 13 13)"/><ellipse class="petal-outer" cx="13" cy="13" rx="9" ry="5.5" transform="rotate(60 13 13)"/><ellipse class="petal-inner" cx="13" cy="13" rx="9" ry="5.5" transform="rotate(60 13 13)"/><ellipse class="petal-outer" cx="13" cy="13" rx="9" ry="5.5" transform="rotate(120 13 13)"/><ellipse class="petal-inner" cx="13" cy="13" rx="9" ry="5.5" transform="rotate(120 13 13)"/><polyline class="tick" points="9,13 12,16 17,10"/></svg>`;
}

// ══════════════════════════════════════════
// CALENDAR STRIP
// ══════════════════════════════════════════
function renderCalStrip() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[calViewDate.getMonth()] + ' ' + calViewDate.getFullYear();

  const days = document.getElementById('cal-days');
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const year = calViewDate.getFullYear(), month = calViewDate.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  let html = '';
  for(let d=1; d<=daysInMonth; d++) {
    const date = new Date(year, month, d);
    const key = fmtDate(date);
    const isSelected = fmtDate(date) === fmtDate(selectedDate);
    const isToday = fmtDate(date) === fmtDate(TODAY);
    const data = loadDayData(date);
    const hasDone = data.done && Object.values(data.done).some(v=>v);
    const hasMood = !!data.mood;
    const hasData = hasDone || hasMood;
    let cls = 'cal-day';
    if(isSelected) cls += ' selected';
    if(isToday) cls += ' today';
    if(hasData) cls += ' has-data';
    html += `<div class="${cls}" onclick="selectDate(${year},${month},${d})">
      <div class="cal-day-name">${dayNames[date.getDay()]}</div>
      <div class="cal-day-num">${d}</div>
      <div class="cal-day-dot"></div>
    </div>`;
  }
  days.innerHTML = html;

  // scroll selected into view
  setTimeout(() => {
    const sel = days.querySelector('.cal-day.selected');
    if(sel) sel.scrollIntoView({inline:'center',behavior:'smooth'});
  }, 50);
}

function changeMonth(dir) {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth()+dir, 1);
  renderCalStrip();
}

function selectDate(y, m, d) {
  selectedDate = new Date(y, m, d);
  dayData = loadDayData(selectedDate);
  calViewDate = new Date(y, m, 1);
  renderCalStrip();
  renderChecklist();
  updateTitle();
}

function updateTitle() {
  const isToday = fmtDate(selectedDate) === fmtDate(TODAY);
  const el = document.getElementById('today-title');
  if(isToday) {
    el.innerHTML = `Today's <em>Wellness</em>`;
  } else {
    const opts = {weekday:'short', month:'short', day:'numeric'};
    el.innerHTML = `<em>${selectedDate.toLocaleDateString('en-US',opts)}</em> Wellness`;
  }
}

// ══════════════════════════════════════════
// CHECKLIST RENDER
// ══════════════════════════════════════════
function renderChecklist() {
  const body = document.getElementById('checklist-body');
  const done = dayData.done || {};
  let html = '';

  sections.forEach(sec => {
    if(!sec.items.length) return;
    html += `<div class="section-label">${sec.name}</div><div class="items">`;
    sec.items.forEach(item => {
      const isDone = done[item.id] ? ' done' : '';
      html += `<div class="item${isDone}" data-id="${item.id}" onclick="toggleItem(this)">
        <div class="petal-box">${petalSVG()}</div>
        <span class="item-emoji">${item.emoji}</span>
        <span class="item-text">${item.title}<span class="item-note">${item.note||''}</span></span>
      </div>`;
    });
    html += `</div>`;
  });

  // mood picker
  const curMood = dayData.mood || '';
  html += `<div class="mood-section">
    <div class="mood-title">How are you feeling today?</div>
    <div class="mood-row">`;
  MOODS.forEach(m => {
    html += `<div class="mood-opt${curMood===m.id?' selected':''}" onclick="setMood('${m.id}')">
      <div class="mood-face">${m.face}</div>
      <div class="mood-label">${m.label}</div>
    </div>`;
  });
  html += `</div></div>`;

  // done banner
  const allItems = getAllItems();
  const doneCount = allItems.filter(id => done[id]).length;
  const allDone = allItems.length > 0 && doneCount === allItems.length;
  html += `<div class="done-banner${allDone?' show':''}"><div class="bloom">🌸</div><p>You bloomed today.</p><small>Every ritual is an act of self-love.</small></div>`;
  html += `<button class="reset-btn" onclick="resetAll()">↺ Start fresh</button>`;

  body.innerHTML = html;
  updateProgress();
}

function getAllItems() {
  return sections.flatMap(s => s.items.map(i => i.id));
}

function toggleItem(el) {
  if(!dayData.done) dayData.done = {};
  const id = el.dataset.id;
  dayData.done[id] = !dayData.done[id];
  el.classList.toggle('done', dayData.done[id]);
  saveDayData(selectedDate, dayData);
  updateProgress();
  // update done banner
  const allItems = getAllItems();
  const doneCount = allItems.filter(id => dayData.done[id]).length;
  const allDone = allItems.length > 0 && doneCount === allItems.length;
  const banner = document.getElementById('checklist-body').querySelector('.done-banner');
  if(banner) banner.classList.toggle('show', allDone);
  // refresh calendar dot
  renderCalStrip();
}

function setMood(id) {
  dayData.mood = dayData.mood === id ? null : id;
  saveDayData(selectedDate, dayData);
  // update UI
  document.querySelectorAll('.mood-opt').forEach(el => el.classList.remove('selected'));
  if(dayData.mood) {
    document.querySelector(`.mood-opt[onclick="setMood('${id}')"]`)?.classList.add('selected');
  }
  renderCalStrip();
}

function resetAll() {
  dayData.done = {};
  saveDayData(selectedDate, dayData);
  renderChecklist();
  renderCalStrip();
}

function updateProgress() {
  const allItems = getAllItems();
  const done = dayData.done || {};
  const doneCount = allItems.filter(id => done[id]).length;
  const pct = allItems.length ? (doneCount/allItems.length)*100 : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `${doneCount} / ${allItems.length}`;
}

// ══════════════════════════════════════════
// WEEKLY SCREEN
// ══════════════════════════════════════════
function getWeekDates(offset=0) {
  const now = new Date(TODAY);
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + (day===0?-6:1) + offset*7);
  monday.setHours(0,0,0,0);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday); d.setDate(monday.getDate()+i); return d;
  });
}

function changeWeek(dir) {
  weekOffset += dir;
  renderWeekly();
}

function renderWeekly() {
  const dates = getWeekDates(weekOffset);
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const allItems = getAllItems();
  const total = allItems.length;

  // week range label
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('week-range-label').textContent = `${fmt(dates[0])} – ${fmt(dates[6])}`;

  // collect data
  const weekData = dates.map(d => {
    const data = loadDayData(d);
    const done = data.done || {};
    const doneCount = allItems.filter(id => done[id]).length;
    return { date:d, done:doneCount, total, mood:data.mood||null, pct: total?Math.round(doneCount/total*100):0 };
  });

  const totalDone = weekData.reduce((a,d)=>a+d.done,0);
  const totalPossible = weekData.reduce((a,d)=>a+d.total,0);
  const avgPct = totalPossible ? Math.round(totalDone/totalPossible*100) : 0;

  // mood tally
  const moodCounts = {};
  weekData.forEach(d => { if(d.mood) moodCounts[d.mood] = (moodCounts[d.mood]||0)+1; });
  const dominantMood = Object.entries(moodCounts).sort((a,b)=>b[1]-a[1])[0];
  const moodDays = weekData.filter(d=>d.mood).length;

  let html = '';

  // goals summary card
  html += `<div class="goals-card">
    <div class="goals-card-title">Goals achieved this week</div>
    <div class="goals-big">${totalDone} <span>/ ${totalPossible} tasks</span></div>
    <div class="goals-sub">${avgPct}% completion rate across the week</div>
    <div class="week-bar-chart">`;
  const maxDone = Math.max(...weekData.map(d=>d.done), 1);
  weekData.forEach((d,i) => {
    const h = Math.max(4, Math.round((d.done/maxDone)*52));
    html += `<div class="bar-col">
      <div class="bar-fill" style="height:${h}px"></div>
      <div class="bar-day">${dayNames[i]}</div>
    </div>`;
  });
  html += `</div></div>`;

  // mood summary card
  if(dominantMood) {
    const m = MOOD_MAP[dominantMood[0]];
    const v = MOOD_VERDICTS[dominantMood[0]];
    html += `<div class="mood-summary-card">
      <div class="mood-summary-title">Mood overview</div>
      <div class="mood-summary-main">
        <div class="mood-summary-face">${m.face}</div>
        <div class="mood-summary-text">
          <div class="mood-summary-verdict">${v.verdict}</div>
          <div class="mood-summary-sub">${v.sub}</div>
        </div>
      </div>
      <div class="mood-breakdown">`;
    Object.entries(moodCounts).sort((a,b)=>b[1]-a[1]).forEach(([id,count]) => {
      const mood = MOOD_MAP[id];
      html += `<div class="mood-chip"><span>${mood.face}</span>${mood.label} × ${count}</div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="mood-summary-card">
      <div class="mood-summary-title">Mood overview</div>
      <div style="color:var(--muted);font-size:13px;text-align:center;padding:12px 0">No moods logged this week yet 🌸</div>
    </div>`;
  }

  // day-by-day breakdown
  html += `<div class="section-label" style="margin-top:4px">Day by day</div>
  <div class="week-days">`;
  weekData.forEach((d,i) => {
    const isToday = fmtDate(d.date) === fmtDate(TODAY);
    const moodFace = d.mood ? MOOD_MAP[d.mood].face : '–';
    html += `<div class="week-day-card" onclick="jumpToDate(${d.date.getFullYear()},${d.date.getMonth()},${d.date.getDate()})">
      <div class="week-day-top">
        <div>
          <div class="week-day-name">${dayNames[i]}${isToday?' · Today':''}</div>
          <div class="week-day-date">${d.date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
        </div>
        <div class="week-day-mood">${moodFace}</div>
      </div>
      <div class="week-progress-bar"><div class="week-progress-fill" style="width:${d.pct}%"></div></div>
      <div class="week-day-stats">${d.done} / ${d.total} tasks · ${d.pct}%</div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('week-body').innerHTML = html;
}

function jumpToDate(y,m,d) {
  selectDate(y,m,d);
  switchTab('today');
}

// ══════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='weekly') renderWeekly();
}

// ══════════════════════════════════════════
// CUSTOMISE
// ══════════════════════════════════════════
function goCustomise() {
  editSections = JSON.parse(JSON.stringify(sections));
  renderCustomise();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-cust').classList.add('active');
}
function goHome() {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-today').classList.add('active');
}
function discardChanges() { editSections=null; goHome(); }
function saveChanges() {
  editSections = collectEditState();
  sections = editSections;
  saveSections(sections);
  renderChecklist();
  goHome();
}

function renderCustomise() {
  const body = document.getElementById('cust-body');
  let html = '';
  editSections.forEach((sec,si) => {
    html += `<div class="cust-section" data-si="${si}">
      <div class="cust-section-head">
        <span class="cust-section-name">${sec.name}</span>
        <button class="del-section-btn" onclick="deleteSection(${si})">🗑</button>
      </div>
      <div class="edit-rows" id="rows-${si}">`;
    sec.items.forEach((item,ii) => { html += editRowHTML(si,ii,item); });
    html += `</div><button class="add-item-btn" onclick="addItem(${si})">＋ Add item</button></div>`;
  });
  html += `<button class="add-section-btn" onclick="openSectionDialog()">＋ Add section</button>`;
  body.innerHTML = html;
  initDrag();
}

function editRowHTML(si,ii,item) {
  return `<div class="edit-row" data-si="${si}" data-ii="${ii}">
    <span class="drag-handle">⠿</span>
    <button class="emoji-btn" onclick="openEmojiPicker(${si},${ii})">${item.emoji}</button>
    <div class="edit-inputs">
      <input class="edit-title" type="text" value="${esc(item.title)}" placeholder="Task name" maxlength="50">
      <input class="edit-note" type="text" value="${esc(item.note||'')}" placeholder="Note (optional)" maxlength="60">
    </div>
    <button class="del-row-btn" onclick="deleteItem(${si},${ii})">×</button>
  </div>`;
}

function esc(s){ return s.replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function collectEditState() {
  const result=[];
  document.querySelectorAll('.cust-section').forEach(secEl=>{
    const si=+secEl.dataset.si, sec=editSections[si], items=[];
    secEl.querySelectorAll('.edit-row').forEach(row=>{
      const ii=+row.dataset.ii, orig=sec.items[ii]||{};
      items.push({
        id:orig.id||('item-'+Date.now()+'-'+Math.random().toString(36).slice(2,6)),
        emoji:row.querySelector('.emoji-btn').textContent,
        title:row.querySelector('.edit-title').value.trim()||'Untitled',
        note:row.querySelector('.edit-note').value.trim(),
      });
    });
    result.push({id:sec.id,name:sec.name,items});
  });
  return result;
}

function deleteSection(si){
  if(editSections[si].items.length>0&&!confirm(`Delete "${editSections[si].name}"?`))return;
  editSections=collectEditState(); editSections.splice(si,1); renderCustomise();
}
function addItem(si){
  editSections=collectEditState();
  editSections[si].items.push({id:'item-'+Date.now(),emoji:'🌸',title:'',note:''});
  renderCustomise();
  const rows=document.querySelectorAll(`#rows-${si} .edit-row`);
  rows[rows.length-1]?.querySelector('.edit-title').focus();
}
function openSectionDialog(){
  document.getElementById('section-name-input').value='';
  document.getElementById('section-dialog').classList.add('show');
  setTimeout(()=>document.getElementById('section-name-input').focus(),100);
}
function closeSectionDialog(){ document.getElementById('section-dialog').classList.remove('show'); }
function confirmAddSection(){
  const name=document.getElementById('section-name-input').value.trim();
  if(!name)return;
  editSections=collectEditState();
  editSections.push({id:'sec-'+Date.now(),name,items:[]});
  closeSectionDialog(); renderCustomise();
}
document.getElementById('section-name-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddSection();});

let emojiTarget=null;
function openEmojiPicker(si,ii){
  editSections=collectEditState(); emojiTarget={si,ii};
  const grid=document.getElementById('emoji-grid');
  grid.innerHTML=EMOJIS.map(e=>`<div class="emoji-opt" onclick="pickEmoji('${e}')">${e}</div>`).join('');
  document.getElementById('emoji-overlay').classList.add('show');
}
function pickEmoji(e){
  if(!emojiTarget)return;
  const{si,ii}=emojiTarget;
  document.querySelectorAll(`#rows-${si} .edit-row`)[ii]?.querySelector('.emoji-btn').textContent=e;
  closeEmojiPicker();
}
function closeEmojiPicker(ev){
  if(!ev||ev.target===document.getElementById('emoji-overlay')){
    document.getElementById('emoji-overlay').classList.remove('show'); emojiTarget=null;
  }
}

function initDrag(){
  document.querySelectorAll('.edit-rows').forEach(container=>{
    let dragging=null,placeholder=null,offsetY=0;
    function getRows(){ return [...container.querySelectorAll('.edit-row:not(.dragging-ghost)')]; }
    function onStart(el,clientY){
      editSections=collectEditState(); dragging=el;
      const rect=el.getBoundingClientRect(); offsetY=clientY-rect.top;
      placeholder=document.createElement('div');
      placeholder.style.cssText=`height:${rect.height}px;border-radius:12px;background:var(--blush);margin-bottom:5px;`;
      el.after(placeholder); el.classList.add('dragging-ghost');
      el.style.cssText=`position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;z-index:50;box-shadow:0 8px 24px rgba(58,46,44,.15);opacity:.95;`;
      document.body.appendChild(el);
    }
    function onMove(clientY){
      if(!dragging)return;
      dragging.style.top=(clientY-offsetY)+'px';
      for(let row of getRows()){
        const r=row.getBoundingClientRect();
        if(clientY<r.top+r.height/2){container.insertBefore(placeholder,row);return;}
      }
      container.appendChild(placeholder);
    }
    function onEnd(){
      if(!dragging)return;
      dragging.style.cssText=''; dragging.classList.remove('dragging-ghost');
      placeholder.replaceWith(dragging); dragging=null; placeholder=null;
      getRows().forEach((r,i)=>r.dataset.ii=i);
    }
    container.querySelectorAll('.drag-handle').forEach(h=>{
      h.addEventListener('mousedown',e=>{e.preventDefault();onStart(h.closest('.edit-row'),e.clientY);});
      h.addEventListener('touchstart',e=>{e.preventDefault();onStart(h.closest('.edit-row'),e.touches[0].clientY);},{passive:false});
    });
    document.addEventListener('mousemove',e=>onMove(e.clientY));
    document.addEventListener('touchmove',e=>{if(dragging){e.preventDefault();onMove(e.touches[0].clientY);}},{passive:false});
    document.addEventListener('mouseup',onEnd);
    document.addEventListener('touchend',onEnd);
  });
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderCalStrip();
renderChecklist();
updateTitle();

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice;
  deferredPrompt=null; document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('dismiss-btn').addEventListener('click',()=>{
  document.getElementById('install-banner').classList.remove('show');
});
</script>
